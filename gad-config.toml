# UPAEC — canonical GAD config for this submodule.
# (Uncle Paul's Agritourism & Educational Corp; 7Greens is the consumer brand.)
# Mirrored to .planning/config.json for compatibility.

[planning]
mode = "yolo"
granularity = "standard"
parallelization = true
commit_docs = true
model_profile = "balanced"

[planning.workflow]
research = true
plan_check = true
verifier = true
nyquist_validation = true
auto_advance = true

[project]
id = "upaec"
name = "Uncle Paul's Agritourism & Educational Corp (UPAEC)"
remote = "https://github.com/B2Gdevs/7ggreens.git"
parent_monorepo = "https://github.com/B2Gdevs/get-anything-done-monorepo.git"
parent_planning_root = "sites/upaec"

[[planning.roots]]
id = "upaec"
path = "."
planningDir = ".planning"
discover = false
